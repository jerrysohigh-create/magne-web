  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
  <style>
    :root {
      --bg-primary: #0a0a0c;
      --bg-secondary: #0f0f12;
      --bg-card: rgba(255, 255, 255, 0.03);
      --bg-card-hover: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.06);
      --border-hover: rgba(255, 255, 255, 0.12);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.5);
      --text-tertiary: rgba(255, 255, 255, 0.3);
      --accent: #00d4d4;
      --accent-secondary: #00ff88;
      --accent-purple: #a855f7;
      --accent-gold: #ffd700;
      --accent-pink: #ff6482;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Outfit', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* NODE NETWORK BACKGROUND */
    #node-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.8;
      pointer-events: none;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 1rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(10, 10, 12, 0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-brand { display: flex; align-items: center; gap: 0.5rem; }
    .nav-brand a { color: var(--text-secondary); text-decoration: none; }
    .nav-logo { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
    .nav-links a:hover { color: var(--accent); }
    .nav-actions {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }
    .nav-cta {
      background: var(--accent);
      color: #000 !important;
      padding: 0.6rem 1.4rem;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
    }
    .nav-cta:hover { opacity: 0.9; transform: translateY(-1px); }
    .nav-contact {
      background: transparent;
      border: 1px solid var(--border-hover);
      color: var(--text-primary) !important;
      padding: 0.6rem 1.4rem;
      border-radius: 8px;
      font-weight: 500;
      text-decoration: none;
    }
    .nav-contact:hover { border-color: var(--accent); color: var(--accent) !important; }
    .nav-web3 {
      color: var(--accent-secondary) !important;
      font-size: 0.85rem;
    }
    .nav-web3:hover { color: var(--accent) !important; }
    .nav-lang-switch {
      color: rgba(255,255,255,0.5) !important;
      font-size: 0.8rem !important;
      text-decoration: none !important;
      padding: 0.2rem 0.5rem !important;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
    }
    .nav-lang-switch:hover {
      color: var(--accent) !important;
      border-color: var(--accent);
    }


    /* CONTENT WRAPPER */
    .content-wrapper {
      position: relative;
      z-index: 1;
      width: min(1200px, calc(100% - 48px));
      margin: 0 auto;
    }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 8rem 2rem 4rem;
      position: relative;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 800px;
      height: 600px;
      background: radial-gradient(ellipse at center, rgba(0,212,212,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-eyebrow {
      font-size: 0.8rem;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      animation: fadeInUp 0.8s ease-out;
    }
    .hero h1 {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.85) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fadeInUp 0.8s ease-out 0.1s both;
      text-shadow: 0 0 60px rgba(0,212,212,0.2);
    }
    .hero-layout {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4rem;
      max-width: 1200px;
      margin: 0 auto;
      flex-wrap: wrap;
    }
    .hero-content {
      flex: 1;
      min-width: 320px;
      text-align: left;
    }
    .hero-visual {
      flex: 1;
      min-width: 280px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .hero-phone {
      max-width: 420px;
      width: 100%;
      opacity: 0.95;
      animation: float 4s ease-in-out infinite;
      filter: drop-shadow(0 20px 60px rgba(0,212,212,0.15));
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    .hero-sub {
      font-size: 1.2rem;
      color: var(--text-secondary);
      max-width: 700px;
      margin-bottom: 2rem;
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }
    .hero-ctas { 
      display: flex; 
      gap: 1rem; 
      margin-bottom: 2rem; 
      flex-wrap: wrap; 
      justify-content: flex-start;
      animation: fadeInUp 0.8s ease-out 0.3s both;
    }
    .btn-primary {
      background: var(--accent);
      color: #000;
      padding: 1rem 2.5rem;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s;
      border: none;
      cursor: pointer;
    }
    .btn-primary:hover { 
      transform: translateY(-3px); 
      box-shadow: 0 15px 40px rgba(0,212,212,0.4);
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border-hover);
      color: var(--text-primary);
      padding: 1rem 2.5rem;
      border-radius: 8px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.3s;
    }
    .btn-secondary-alt {
      background: var(--accent-purple);
      color: #fff;
    }
    .btn-secondary-alt:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(168,85,247,0.4);
    }
    .btn-secondary:hover { 
      border-color: var(--accent); 
      color: var(--accent);
      box-shadow: 0 0 20px rgba(0,212,212,0.2);
    }
    .trust-chips { 
      display: flex; 
      gap: 1rem; 
      flex-wrap: wrap; 
      justify-content: flex-start; 
      margin-top: 1.5rem;
      animation: fadeInUp 0.8s ease-out 0.4s both;
    }
    .trust-chip {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 0.5rem 1.2rem;
      border-radius: 50px;
      font-size: 0.85rem;
      color: var(--text-secondary);
      backdrop-filter: blur(10px);
    }
    .hero-supporting {
      margin-top: 2rem;
      font-size: 0.95rem;
      color: var(--text-tertiary);
      max-width: 600px;
      animation: fadeInUp 0.8s ease-out 0.5s both;
    }

    /* SECTION BASE */
    section { 
      padding: 6rem 2rem; 
      max-width: 1200px; 
      margin: 0 auto; 
      position: relative;
    }
    .section-title {
      text-align: center;
      margin-bottom: 4rem;
    }
    .section-title h2 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.8) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .section-title p { 
      color: var(--text-secondary); 
      font-size: 1.1rem; 
      max-width: 600px; 
      margin: 0 auto; 
    }

    /* LIVE COMMUNITY MOMENTUM */
    #momentum {
      background: linear-gradient(180deg, var(--bg-secondary) 0%, rgba(0,212,212,0.05) 100%);
      padding: 4rem 2rem;
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      margin: 2rem auto;
      max-width: 1000px;
      border: 1px solid var(--border);
    }
    #momentum::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at center, rgba(0,212,212,0.015) 0%, transparent 50%);
      animation: pulse-glow 6s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.02); }
    }
    .momentum-container { max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }
    .momentum-eyebrow {
      text-align: center;
      font-size: 0.75rem;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .momentum-title {
      text-align: center;
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 20px rgba(0,212,212,0.15);
    }
    .momentum-sub {
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: rgba(0,212,212,0.05);
      border: 1px solid rgba(0,212,212,0.2);
      border-radius: 16px;
      padding: 1.5rem 1rem;
      text-align: center;
      transition: all 0.3s;
    }
    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,212,212,0.08);
      border-color: rgba(0,212,212,0.25);
    }
    .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    .stat-label { font-size: 0.9rem; color: var(--text-primary); font-weight: 500; }
    .stat-sub { font-size: 0.7rem; color: var(--text-tertiary); margin-top: 0.25rem; }
    .progress-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .progress-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    .progress-bar {
      height: 12px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-secondary));
      border-radius: 10px;
      transition: width 0.5s ease;
      position: relative;
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      animation: shimmer 2s infinite;
    }
    @keyframes shimmer {
      0% { left: -100%; }
      100% { left: 100%; }
    }
    .momentum-footer {
      text-align: center;
      color: var(--text-tertiary);
      font-size: 0.85rem;
    }
    .momentum-footer span { margin: 0 0.5rem; display: inline-flex; align-items: center; gap: 0.3rem; }
    .momentum-footer .foot-icon { width: 14px; height: 14px; flex-shrink: 0; }
    .momentum-cta { text-align: center; margin-top: 2rem; display: flex; justify-content: center; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .dashboard-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: var(--accent);
      color: #000;
      padding: 1rem 2.5rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      transition: all 0.3s;
      border: none;
      cursor: pointer;
    }
    .dashboard-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(0,212,212,0.4);
    }
    .dashboard-btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* WHY MAGNE */
    #why-magne .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }

    /* PARTNERS */
    #partners {
      padding: 5rem 2rem;
      text-align: center;
    }

    .partners-title {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 0.75rem;
    }

    .partners-heading {
      font-size: 1.1rem;
      font-weight: 400;
      margin-bottom: 2rem;
      color: var(--text-secondary);
      text-align: center;
    }

    .partners-heading span {
      color: var(--accent);
    }

    .partners-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .partner-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.3s;
      min-height: 90px;
    }

    .partner-card:hover {
      border-color: var(--border-hover);
      background: var(--bg-card-hover);
      transform: translateY(-2px);
    }

    .partner-card img {
      height: 32px;
      width: auto;
      max-width: 110px;
      object-fit: contain;
    }

    .partner-card:hover img {
      filter: brightness(1.1);
    }

    .partner-card .partner-name {
      font-size: 0.7rem;
      color: var(--text-secondary);
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .partner-card.ti-card img {
      filter: brightness(0) invert(1);
    }

    .partners-cta {
      margin-top: 2.5rem;
      font-size: 0.82rem;
      color: var(--text-secondary);
    }

    .partners-cta a {
      color: var(--accent);
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .partners-cta a:hover {
      opacity: 0.7;
    }

    .partners-disclaimer {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: var(--text-tertiary);
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.6;
      text-align: center;
    }

    /* SECURITY */
    #security {
      background: linear-gradient(180deg, var(--bg-primary) 0%, rgba(138,43,226,0.05) 100%);
      border-radius: 24px;
      margin: 2rem auto;
    }
.security-arch {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin: 3rem auto 4rem;
      max-width: 900px;
    }
    .arch-layer {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.5rem 1rem;
      border-radius: 12px;
      border: 1px solid;
    }
    .arch-layer-1 {
      background: rgba(0,212,212,0.05);
      border-color: rgba(0,212,212,0.2);
    }
    .arch-layer-2 {
      background: rgba(168,85,247,0.05);
      border-color: rgba(168,85,247,0.2);
    }
    .arch-layer-3 {
      background: rgba(255,215,0,0.05);
      border-color: rgba(255,215,0,0.2);
    }
    .arch-label {
      font-size: 1.5rem;
      font-weight: 700;
      font-family: "JetBrains Mono", monospace;
    }
    .arch-layer-1 .arch-label { color: var(--accent); }
    .arch-layer-2 .arch-label { color: var(--accent-purple); }
    .arch-layer-3 .arch-label { color: var(--accent-gold); }
    .arch-content h4 {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.2rem;
    }
    .arch-content p {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
    .arch-connector {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent-purple), var(--accent-gold));
      flex-shrink: 0;
    }
    @media (max-width: 768px) {
      .security-arch {
        flex-direction: column;
        gap: 0.5rem;
      }
      .arch-connector {
        width: 2px;
        height: 30px;
        background: linear-gradient(180deg, var(--accent), var(--accent-purple), var(--accent-gold));
      }
    }
    .security-layers { display: flex; flex-direction: column; gap: 2rem; max-width: 900px; margin: 0 auto; }
    .security-layer {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      position: relative;
      overflow: hidden;
      transition: all 0.3s;
    }
    .security-layer:hover {
      transform: translateX(8px);
      border-color: var(--accent-purple);
    }
    .security-layer::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 4px;
    }
    .security-layer.layer-1::before { background: linear-gradient(90deg, var(--accent), #0088aa); }
    .security-layer.layer-2::before { background: linear-gradient(90deg, var(--accent-purple), #7c3aed); }
    .security-layer.layer-3::before { background: linear-gradient(90deg, var(--accent-gold), #f59e0b); }
    .layer-label {
      font-size: 0.75rem;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }
    .layer-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; }
    .layer-body { color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 1.5rem; line-height: 1.7; }
    .layer-badge {
      display: inline-block;
      background: rgba(0,212,212,0.1);
      border: 1px solid rgba(0,212,212,0.3);
      color: var(--accent);
      padding: 0.4rem 1rem;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .security-closing {
      text-align: center;
      margin-top: 3rem;
      padding: 2rem;
      color: var(--text-secondary);
      font-size: 1.1rem;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
      font-style: italic;
    }

    /* TRUST */
    #trust .trust-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
    }
    .trust-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem 1rem;
      text-align: center;
      transition: all 0.3s;
    }
    .trust-group {
      margin-bottom: 3rem;
    }
    .trust-group:last-child {
      margin-bottom: 0;
    }
    .trust-group-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 1rem;
      text-align: left;
      padding-left: 0.5rem;
    }
    .trust-card:hover { 
      border-color: var(--accent-secondary);
      transform: translateY(-4px);
      box-shadow: 0 10px 30px rgba(0,255,136,0.1);
    }
    .trust-card h4 { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.5rem; }
    .trust-card p { font-size: 0.75rem; color: var(--accent-secondary); }

    /* PRODUCT */
.product-layout {
      display: flex;
      align-items: center;
      gap: 4rem;
      margin-top: 3rem;
    }
    .product-visual {
      flex: 1;
      display: flex;
      justify-content: center;
    }
    .product-phone {
      max-width: 280px;
      width: 100%;
      filter: drop-shadow(0 20px 40px rgba(0,0,0,0.5));
    }
    .product-specs {
      flex: 1.5;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }
    @media (max-width: 900px) {
      .product-layout {
        flex-direction: column;
      }
      .product-specs {
        grid-template-columns: 1fr;
      }
    }
    #product .product-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }
    .product-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      transition: all 0.3s;
    }
    .product-card:hover { 
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: 0 15px 35px rgba(0,212,212,0.1);
    }
    .product-card h4 { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; }
    .product-card p { font-size: 0.85rem; color: var(--text-secondary); }

    /* NETWORK */
    #network .network-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }
    .network-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .network-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent-purple), var(--accent));
    }
    .network-card:hover { 
      border-color: var(--accent-purple);
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(168,85,247,0.15);
    }
    .network-card h3 { font-size: 1.2rem; font-weight: 600; margin-bottom: 1rem; }
    .network-card p { font-size: 0.9rem; color: var(--text-secondary); }

    /* PROGRESS */
    #progress .progress-columns {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
    }
    .progress-col {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      transition: all 0.3s;
    }
    .progress-col:hover {
      border-color: var(--accent-gold);
      transform: translateY(-4px);
    }
    .progress-col h4 { 
      font-size: 1rem; 
      font-weight: 600; 
      margin-bottom: 1rem; 
      color: var(--accent-gold); 
    }
    .progress-col p { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6; }

    /* COMMERCIAL */
    #commercial .commercial-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
      margin-bottom: 3rem;
    }
    .commercial-card {
      background: linear-gradient(135deg, rgba(0,212,212,0.08) 0%, rgba(0,30,30,0.3) 100%);
      border: 1px solid rgba(0,212,212,0.2);
      border-radius: 20px;
      padding: 2rem;
      text-align: center;
      transition: all 0.3s;
    }
    .commercial-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(0,212,212,0.15);
      border-color: var(--accent);
    }
    .commercial-card h4 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.75rem; }
    .commercial-card p { font-size: 0.85rem; color: var(--text-secondary); }

    /* FINAL CTA */
    #cta .cta-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2rem;
      max-width: 800px;
      margin: 0 auto;
    }
    .cta-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 3rem;
      text-align: center;
      transition: all 0.4s;
    }
    .cta-card:hover { 
      border-color: var(--accent);
      transform: translateY(-8px);
      box-shadow: 0 25px 50px rgba(0,212,212,0.15);
    }
    .cta-card h3 { font-size: 1.5rem; font-weight: 600; margin-bottom: 1rem; }
    .cta-card p { font-size: 0.95rem; color: var(--text-secondary); margin-bottom: 2rem; line-height: 1.7; }

    /* CONTACT SECTION */
    .contact-section {
      padding: 6rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    .contact-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2rem;
      margin-top: 3rem;
    }
    .contact-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      text-align: center;
    }
    .contact-card h3 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    .contact-card p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }
    @media (max-width: 768px) {
      .contact-grid {
        grid-template-columns: 1fr;
      }
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 4rem 2rem;
      border-top: 1px solid var(--border);
      color: var(--text-tertiary);
      font-size: 0.9rem;
      margin-top: 4rem;
    }
    footer a { color: var(--text-secondary); text-decoration: none; transition: color 0.2s; }
    footer a:hover { color: var(--accent); }
    .footer-links { display: flex; justify-content: center; gap: 2rem; margin-top: 1rem; }
    .footer-links-secondary { display: flex; justify-content: center; gap: 2rem; margin-top: 0.75rem; }
    .footer-links-secondary a { color: var(--text-secondary); text-decoration: none; font-size: 0.85rem; }
    .footer-links-secondary a:hover { color: var(--accent); }

    /* ANIMATIONS */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    .animate { 
      opacity: 0; 
      transform: translateY(30px);
      transition: all 0.6s ease-out;
    }
    .animate.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* RESPONSIVE */
    @media (max-width: 1024px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .trust-grid { grid-template-columns: repeat(4, 1fr); }
      .product-grid { grid-template-columns: repeat(2, 1fr); }
      .network-grid { grid-template-columns: repeat(2, 1fr); }
      .progress-columns { grid-template-columns: repeat(2, 1fr); }
      .commercial-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      nav { padding: 1rem; }
      .nav-links { display: none; }
      section { padding: 4rem 1rem; }
      .hero h1 { font-size: 2.2rem; }
      .cards-grid { grid-template-columns: 1fr !important; }
      .why-magne .cards-grid { grid-template-columns: 1fr; }
      .trust-grid { grid-template-columns: repeat(2, 1fr); }
      .product-grid { grid-template-columns: 1fr !important; }
      .network-grid { grid-template-columns: 1fr !important; }
      .progress-columns { grid-template-columns: 1fr !important; }
      .commercial-grid { grid-template-columns: 1fr !important; }
      .cta-grid { grid-template-columns: 1fr !important; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
  
    /* FOOTER SOCIAL ICONS */
    .footer-socials { display: flex; justify-content: center; flex-wrap: wrap; gap: 0.75rem; margin: 1rem 0; }
    .footer-socials a {
      display: inline-flex; align-items: center; justify-content: center;
      height: 42px; padding: 0;
      border: 1px solid var(--border); border-radius: 999px;
      color: var(--text-secondary); font-size: 0.82rem; transition: all 0.2s;
    }
    .footer-socials a:hover { color: var(--accent); border-color: var(--accent); background: rgba(0, 212, 212, 0.06); }
    .footer-copy { margin-top: 1.5rem; opacity: 0.5; }

    .footer-socials a.footer-icon svg { width: 20px; height: 20px; }
    .footer-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text-secondary);
      transition: all 0.2s;
      padding: 0;
    }
    .footer-icon:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(0, 212, 212, 0.1);
    }

    .footer-brand-logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .footer-brand-logo img {
      height: 24px;
      width: auto;
      margin-bottom: 0.75rem;

    }
    .footer-brand-logo p {
      color: var(--text-secondary);

    }
  
    .nav-logo-img {
      height: 20px;

    }
  
    .trademark-notice {

    }
