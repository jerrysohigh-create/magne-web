<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAGNE Network — A Native Value Stack from Device to Chain</title>
  <link rel="alternate" hreflang="zh-Hant" href="tc/magne-network.html">
  <link rel="alternate" hreflang="en" href="magne-network.html">
  <link rel="alternate" hreflang="x-default" href="magne-network.html">

  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta property="og:title" content="MAGNE Network — A Native Value Stack from Device to Chain">
  <meta property="og:description" content="MAGNE L1 and MHash L2 provide the blockchain infrastructure for the MAGNE Phone ecosystem, with native wallet, bridge, and Web3 access.">
  <meta property="og:image" content="https://jerrysohigh-create.github.io/magne-web/phone-white.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="MAGNE Network — A Native Value Stack from Device to Chain">
  <meta name="twitter:description" content="MAGNE L1 and MHash L2 provide the blockchain infrastructure for the MAGNE Phone ecosystem, with native wallet, bridge, and Web3 access.">
  <meta name="twitter:image" content="https://jerrysohigh-create.github.io/magne-web/phone-white.png">
  <link rel="icon" type="image/png" href="logo-icon-circle.png">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
  <style>
    :root {
      --bg-primary: #0a0a0c;
      --bg-secondary: #0f0f12;
      --bg-card: rgba(255, 255, 255, 0.03);
      --bg-card-hover: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.06);
      --border-hover: rgba(255, 255, 255, 0.12);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.5);
      --text-tertiary: rgba(255, 255, 255, 0.3);
      --accent: #00d4d4;
      --accent-secondary: #00ff88;
      --accent-cyan: #00d4d4;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Outfit', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* NODE NETWORK BACKGROUND */
    #node-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      opacity: 0.5;
      pointer-events: none;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 1rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(10, 10, 12, 0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-brand { display: flex; align-items: center; gap: 0.5rem; }
    .nav-brand a { color: var(--text-secondary); text-decoration: none; }
    .nav-logo { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
    .nav-links a:hover { color: var(--accent); }
    .nav-links a.active { color: var(--accent); }
    .nav-actions {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }
    .nav-cta {
      background: var(--accent);
      color: #000 !important;
      padding: 0.6rem 1.4rem;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
    }
    .nav-cta:hover { opacity: 0.9; transform: translateY(-1px); }
    .nav-contact {
      background: transparent;
      border: 1px solid var(--border-hover);
      color: var(--text-primary) !important;
      padding: 0.6rem 1.4rem;
      border-radius: 8px;
      font-weight: 500;
      text-decoration: none;
    }
    .nav-contact:hover { border-color: var(--accent); color: var(--accent) !important; }
    .nav-web3 {
      color: var(--accent-secondary) !important;
      font-size: 0.85rem;
    }
    .nav-web3:hover { color: var(--accent) !important; }
    .nav-lang-switch {
      color: rgba(255,255,255,0.5) !important;
      font-size: 0.8rem !important;
      text-decoration: none !important;
      padding: 0.2rem 0.5rem !important;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
    }
    .nav-lang-switch:hover {
      color: var(--accent) !important;
      border-color: var(--accent);
    }


    /* CONTENT WRAPPER */
    .content-wrapper {
      position: relative;
      z-index: 1;
      width: min(1200px, calc(100% - 48px));
      margin: 0 auto;
    }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 8rem 2rem 4rem;
      position: relative;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 900px; height: 700px;
      background: radial-gradient(ellipse at center, rgba(0,212,212,0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-eyebrow {
      font-size: 0.8rem;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      animation: fadeInUp 0.8s ease-out;
    }
    .hero h1 {
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.85) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fadeInUp 0.8s ease-out 0.1s both;
    }
    .hero-sub {
      font-size: 1.15rem;
      color: var(--text-secondary);
      max-width: 650px;
      margin-bottom: 3rem;
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }
    .hero-ctas { 
      display: flex; 
      gap: 1rem; 
      flex-wrap: wrap; 
      justify-content: center;
      animation: fadeInUp 0.8s ease-out 0.3s both;
    }
    .btn-primary {
      background: var(--accent);
      color: #000;
      padding: 1rem 2.5rem;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s;
      border: none;
      cursor: pointer;
    }
    .btn-primary:hover { 
      transform: translateY(-3px); 
      box-shadow: 0 15px 40px rgba(0,212,212,0.3);
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border-hover);
      color: var(--text-primary);
      padding: 1rem 2.5rem;
      border-radius: 8px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.3s;
    }
    .btn-secondary:hover { 
      border-color: var(--accent); 
      color: var(--accent);
    }

    /* SECTION BASE */
    section { 
      padding: 6rem 2rem; 
      max-width: 1100px; 
      margin: 0 auto; 
      position: relative;
    }
    .section-title {
      text-align: center;
      margin-bottom: 4rem;
    }
    .section-title h2 {
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .section-title p {
      color: var(--text-secondary);
      max-width: 600px;
      margin: 0 auto;
      font-size: 1rem;
    }

    /* DUAL CHAIN ARCHITECTURE */
    .chain-arch {
      display: flex;
      align-items: stretch;
      justify-content: center;
      gap: 3rem;
      margin: 4rem 0;
    }
    .chain-box {
      flex: 1;
      max-width: 480px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      position: relative;
      overflow: hidden;
    }
    .chain-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
    }
    .chain-box.l1::before { background: linear-gradient(90deg, var(--accent), var(--accent-secondary)); }
    .chain-box.l2::before { background: linear-gradient(90deg, var(--accent-cyan), #0088aa); }
    .chain-label {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.3rem 0.8rem;
      border-radius: 50px;
      margin-bottom: 1.5rem;
      letter-spacing: 1px;
    }
    .chain-box.l1 .chain-label {
      background: rgba(0,212,212,0.15);
      color: var(--accent);
    }
    .chain-box.l2 .chain-label {
      background: rgba(0,136,170,0.15);
      color: var(--accent-cyan);
    }
    .chain-box h3 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .chain-box p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.8;
      margin-bottom: 1.5rem;
    }
    .chain-features {
      list-style: none;
      padding: 0;
    }
    .chain-features li {
      padding: 0.5rem 0;
      color: var(--text-secondary);
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .chain-features li::before {
      content: '→';
      color: var(--accent);
      font-weight: 600;
    }
    .chain-connector {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
    }
    .chain-connector-icon {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.5rem;
    }
    .chain-connector span {
      font-size: 0.7rem;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* WHAT RUNS */
    .ecosystem-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      margin: 3rem 0;
    }
    .eco-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      text-align: center;
      transition: all 0.3s;
    }
    .eco-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-3px);
    }
    .eco-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }
    .eco-card h4 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .eco-card p {
      color: var(--text-secondary);
      font-size: 0.85rem;
      line-height: 1.6;
    }

    /* ECOSYSTEM PARTNERS */
    .eco-partners {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
    }
    .eco-partners-title {
      text-align: center;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }
    .eco-partners-desc {
      text-align: center;
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 2rem;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
    .eco-partners-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1rem;
    }
    .eco-partner-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      min-height: 90px;
      transition: all 0.3s;
    }
    .eco-partner-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
    }
    .eco-partner-card img {
      height: 32px;
      width: auto;
      max-width: 100px;
      object-fit: contain;
      filter: none;
    }
    .eco-partner-card span {
      font-size: 0.7rem;
      color: var(--text-secondary);
    }
    .eco-partner-light span {
      color: #ffffff;
    }

    .eco-partners-disclaimer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: var(--text-tertiary);
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.6;
      text-align: center;
    }

    /* SECTION EYEBROW */
    .section-eyebrow {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent-cyan);
      margin-bottom: 1rem;
      font-weight: 600;
    }

    /* ECOSYSTEM SHOWCASE */
    .showcase-section {
      padding: 6rem 2rem;
    }
    .showcase-content {
      width: 100%;
    }
    .showcase-body p {
      color: var(--text-secondary);
      font-size: 1rem;
      line-height: 1.75;
      text-align: center;
      margin-bottom: 3rem;
    }
    .showcase-highlights {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    .highlight-item {
      display: flex;
      align-items: center;
    }
    .highlight-tag {
      display: inline-block;
      padding: 0.5rem 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 50px;
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .showcase-cta {
      text-align: center;
    }

    /* ECOSYSTEM SHOWCASE */
    .ecosystem-showcase {
      margin: 4rem 0;
    }
    .ecosystem-showcase .section-title {
      text-align: center;
      margin-bottom: 2rem;
    }
    .ecosystem-showcase .section-title .eyebrow {
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
      display: block;
    }
    .ecosystem-showcase .section-title h2 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .ecosystem-showcase .section-title p {
      color: var(--text-secondary);
      font-size: 1rem;
      max-width: 600px;
      margin: 0 auto;
    }
    .showcase-card {
      position: relative;
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem;
      overflow: hidden;
      min-height: 400px;
    }
    .showcase-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: url('assets/clash-game-bg.jpg');
      background-size: cover;
      background-position: center;
      z-index: 0;
    }
    .showcase-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 1;
    }
    .showcase-card > * {
      position: relative;
      z-index: 2;
    }
    .showcase-content-wrapper {
      max-width: 100%;
    }
    .showcase-tag {
      display: inline-block;
      background: rgba(0, 212, 212, 0.1);
      color: var(--accent);
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    .showcase-card h3 {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    .showcase-points {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin: 1.5rem 0;
    }
    .showcase-points span {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.4rem 1rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .showcase-note {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin: 1.5rem 0;
      line-height: 1.6;
    }
    .showcase-actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 1.5rem;
    }
    .showcase-actions a {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      border-radius: 999px;
      font-weight: 500;
      font-size: 0.9rem;
      text-decoration: none;
      transition: all 0.2s ease;
    }
    .showcase-actions a:first-child {
      background: var(--accent);
      color: var(--bg-primary);
    }
    .showcase-actions a:first-child:hover {
      background: #00b8b8;
    }
    .showcase-actions a:last-child {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-primary);
    }
    .showcase-actions a:last-child:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* DEVICE JOURNEY */
    .journey-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem;
      margin: 4rem 0;
    }
    .journey-section h3 {
      text-align: center;
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 3rem;
    }
    .journey-flow {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0;
      flex-wrap: wrap;
    }
    .journey-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 1rem;
      min-width: 120px;
    }
    .journey-icon {
      width: 60px;
      height: 60px;
      border-radius: 16px;
      background: rgba(0,212,212,0.1);
      border: 1px solid rgba(0,212,212,0.2);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
    }
    .journey-label {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .journey-sublabel {
      font-size: 0.7rem;
      color: var(--text-secondary);
    }
    .journey-arrow {
      font-size: 1.5rem;
      color: var(--text-tertiary);
      padding: 0 0.5rem;
    }

    /* GATEWAY VALUE */
    .gateway-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2rem;
      margin: 4rem 0;
    }
    .gateway-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      transition: all 0.3s;
    }
    .gateway-card:hover {
      border-color: var(--border-hover);
    }
    .gateway-card h4 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: var(--accent);
    }
    .gateway-card p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.7;
    }

    /* OPEN DEV */
    .dev-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
      margin: 3rem 0;
    }
    .dev-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      text-align: center;
      transition: all 0.2s;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .dev-card-soon {
      opacity: 0.6;
      cursor: default;
    }
    .dev-card-soon:hover {
      transform: none;
      border-color: var(--border);
      color: inherit;
    }
    .coming-soon {
      display: block;
      margin-top: 0.75rem;
      font-size: 0.7rem;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .dev-card:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-3px);
    }
    .dev-icon {
      font-size: 2rem;
      margin-bottom: 0.75rem;
    }
    .dev-card h4 {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .dev-card p {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }


    /* PROTOCOL CARD */
    .protocol-card-section {
      padding: 0 2rem 4rem;
      max-width: 1100px;
      margin: 0 auto;
    }
    .protocol-card {
      position: relative;
      background-image: url('assets/magne-protocol-bg.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      border-radius: 20px;
      overflow: hidden;
      min-height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .protocol-card-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0.6) 100%);
      z-index: 1;
    }
    .protocol-card-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 3rem 4rem;
      max-width: 700px;
    }
    .protocol-eyebrow {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #00e5c4;
      margin-bottom: 0.75rem;
    }
    .protocol-card-content h3 {
