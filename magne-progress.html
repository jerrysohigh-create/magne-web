  <style>
    :root {
      --bg-primary: #0a0a0c;
      --bg-secondary: #0f0f12;
      --bg-card: rgba(255, 255, 255, 0.03);
      --bg-card-hover: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.06);
      --border-hover: rgba(255, 255, 255, 0.12);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.5);
      --text-tertiary: rgba(255, 255, 255, 0.3);
      --accent: #ffd700;
      --accent-secondary: #00ff88;
      --accent-gold: #ffd700;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Outfit', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* NODE NETWORK BACKGROUND */
    #node-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      opacity: 0.5;
      pointer-events: none;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 1rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(10, 10, 12, 0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-brand { display: flex; align-items: center; gap: 0.5rem; }
    .nav-brand a { color: var(--text-secondary); text-decoration: none; }
    .nav-logo { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
    .nav-links a:hover { color: var(--accent); }
    .nav-links a.active { color: var(--accent); }
    .nav-actions {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }
    .nav-cta {
      background: var(--accent);
      color: #000 !important;
      padding: 0.6rem 1.4rem;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
    }
    .nav-cta:hover { opacity: 0.9; transform: translateY(-1px); }
    .nav-contact {
      background: transparent;
      border: 1px solid var(--border-hover);
      color: var(--text-primary) !important;
      padding: 0.6rem 1.4rem;
      border-radius: 8px;
      font-weight: 500;
      text-decoration: none;
    }
    .nav-contact:hover { border-color: var(--accent); color: var(--accent) !important; }
    .nav-web3 {
      color: var(--accent-secondary) !important;
      font-size: 0.85rem;
    }
    .nav-web3:hover { color: var(--accent) !important; }
    .nav-lang-switch {
      color: rgba(255,255,255,0.5) !important;
      font-size: 0.8rem !important;
      text-decoration: none !important;
      padding: 0.2rem 0.5rem !important;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
    }
    .nav-lang-switch:hover {
      color: var(--accent) !important;
      border-color: var(--accent);
    }


    /* CONTENT WRAPPER */
    .content-wrapper {
      position: relative;
      z-index: 1;
      width: min(1200px, calc(100% - 48px));
      margin: 0 auto;
    }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 8rem 2rem 4rem;
      position: relative;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 900px; height: 700px;
      background: radial-gradient(ellipse at center, rgba(255,215,0,0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-eyebrow {
      font-size: 0.8rem;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      animation: fadeInUp 0.8s ease-out;
    }
    .hero h1 {
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.85) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fadeInUp 0.8s ease-out 0.1s both;
    }
    .hero-sub {
      font-size: 1.15rem;
      color: var(--text-secondary);
      max-width: 650px;
      margin-bottom: 3rem;
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }
    .hero-ctas { 
      display: flex; 
      gap: 1rem; 
      flex-wrap: wrap; 
      justify-content: center;
      animation: fadeInUp 0.8s ease-out 0.3s both;
    }
    .btn-primary {
      background: var(--accent);
      color: #000;
      padding: 1rem 2.5rem;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s;
      border: none;
      cursor: pointer;
    }
    .btn-primary:hover { 
      transform: translateY(-3px); 
      box-shadow: 0 15px 40px rgba(255,215,0,0.3);
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border-hover);
      color: var(--text-primary);
      padding: 1rem 2.5rem;
      border-radius: 8px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.3s;
    }
    .btn-secondary:hover { 
      border-color: var(--accent); 
      color: var(--accent);
    }

    /* SECTION BASE */
    section { 
      padding: 6rem 2rem; 
      max-width: 1100px; 
      margin: 0 auto; 
      position: relative;
    }
    .section-title {
      text-align: center;
      margin-bottom: 4rem;
    }
    .section-title h2 {
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .section-title p {
      color: var(--text-secondary);
      max-width: 600px;
      margin: 0 auto;
      font-size: 1rem;
    }

    /* PROGRESS OVERVIEW */
    .overview-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
      margin: 3rem 0 4rem;
    }
    .overview-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      text-align: center;
    }
    .overview-card .num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    .overview-card .label {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    /* TIMELINE */
    .timeline-section {
      margin: 4rem 0;
    }
    .timeline-track {
      position: relative;
      padding-left: 2rem;
    }
    .timeline-track::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(180deg, var(--accent), var(--accent-secondary));
    }
    .timeline-item {
      position: relative;
      padding: 1.5rem 0 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
    }
    .timeline-item:last-child {
      border-bottom: none;
    }
    .timeline-item::before {
      content: '';
      position: absolute;
      left: -2rem;
      top: 2rem;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      transform: translateX(-5px);
    }
    .timeline-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--accent);
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }
    .timeline-item h4 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .timeline-item p {
      color: var(--text-secondary);
      font-size: 0.9rem;
      line-height: 1.6;
    }
    .timeline-status {
      display: inline-block;
      font-size: 0.7rem;
      padding: 0.2rem 0.6rem;
      border-radius: 50px;
      font-weight: 600;
      margin-left: 0.5rem;
    }
    .timeline-status.done { background: rgba(0,255,136,0.15); color: var(--accent-secondary); }
    .timeline-status.active { background: rgba(255,215,0,0.15); color: var(--accent-gold); }
    .timeline-status.planned { background: rgba(255,255,255,0.1); color: var(--text-secondary); }

    /* PROGRESS COLUMNS */
    .progress-columns {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2rem;
      margin: 4rem 0;
    }
    .progress-col {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
    }
    .progress-col h4 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .progress-col h4 .icon {
      font-size: 1.25rem;
    }
    .progress-list {
      list-style: none;
      padding: 0;
    }
    .progress-list li {
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
      color: var(--text-secondary);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .progress-list li:last-child {
      border-bottom: none;
    }
    .progress-list .status {
      font-size: 0.75rem;
      padding: 0.2rem 0.6rem;
      border-radius: 50px;
      font-weight: 600;
    }
    .progress-list .status.done { background: rgba(0,255,136,0.15); color: var(--accent-secondary); }
    .progress-list .status.active { background: rgba(255,215,0,0.15); color: var(--accent-gold); }
    .progress-list .status.planned { background: rgba(255,255,255,0.1); color: var(--text-secondary); }

    /* COMMERCIAL */
    .commercial-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
      margin: 3rem 0;
    }
    .commercial-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      text-align: center;
    }
    .commercial-card .icon {
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    .commercial-card h4 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .commercial-card p {
      color: var(--text-secondary);
      font-size: 0.85rem;
      line-height: 1.6;
    }

    /* CTA */
    .cta-section {
      text-align: center;
      padding: 6rem 2rem;
      background: linear-gradient(180deg, transparent 0%, rgba(255,215,0,0.03) 100%);
      border-top: 1px solid var(--border);
    }
    .cta-section h2 {
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .cta-section p {
      color: var(--text-secondary);
      margin-bottom: 2.5rem;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
    .cta-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 4rem 2rem;
      border-top: 1px solid var(--border);
      color: var(--text-tertiary);
      font-size: 0.9rem;
    }
    footer a { color: var(--text-secondary); text-decoration: none; transition: color 0.2s; }
    footer a:hover { color: var(--accent); }
    .footer-links { display: flex; justify-content: center; gap: 2rem; margin-top: 1rem; }
    .footer-links-secondary { display: flex; justify-content: center; gap: 2rem; margin-top: 0.75rem; }
    .footer-links-secondary a { color: var(--text-secondary); text-decoration: none; font-size: 0.85rem; }
    .footer-links-secondary a:hover { color: var(--accent); }

    /* ANIMATIONS */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate { opacity: 0; }
    .animate.visible {
      animation: fadeInUp 0.6s ease-out forwards;
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .overview-grid { grid-template-columns: repeat(2, 1fr); }
      .progress-columns { grid-template-columns: 1fr; }
      .commercial-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      nav { padding: 1rem 1.5rem; }
      .nav-links { gap: 1rem; }
      .overview-grid { grid-template-columns: 1fr; }
      .commercial-grid { grid-template-columns: 1fr; }
    }
  
    /* FOOTER SOCIAL ICONS */
    .footer-socials { display: flex; justify-content: center; flex-wrap: wrap; gap: 0.75rem; margin: 1rem 0; }
    .footer-socials a {
      display: inline-flex; align-items: center; justify-content: center;
      height: 42px; padding: 0;
      border: 1px solid var(--border); border-radius: 999px;
      color: var(--text-secondary); font-size: 0.82rem; transition: all 0.2s;
    }
    .footer-socials a:hover { color: var(--accent); border-color: var(--accent); background: rgba(0, 212, 212, 0.06); }
    .footer-copy { margin-top: 1.5rem; opacity: 0.5; }

    .footer-socials a.footer-icon svg { width: 20px; height: 20px; }
    .footer-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text-secondary);
      transition: all 0.2s;
      padding: 0;
    }
    .footer-icon:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(0, 212, 212, 0.1);
    }

    .footer-brand-logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .footer-brand-logo img {
      height: 24px;
      width: auto;
      margin-bottom: 0.75rem;
      opacity: 0.9;
    }
    .footer-brand-logo p {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
  
    .nav-logo-img {
      height: 20px;
      width: auto;
      display: block;
    }
  
    .trademark-notice {
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-align: center;
      margin-top: 1rem;
      opacity: 0.7;
    }
    .trademark-notice a {
      color: var(--accent);
      text-decoration: none;
    }
    .trademark-notice a:hover {
      text-decoration: underline;
    }
  </style>
