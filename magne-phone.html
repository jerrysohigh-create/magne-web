<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAGNE Phone Gen1 — Hardware, Software, and Ownership Features</title>
  <link rel="alternate" hreflang="zh-Hant" href="https://jerrysohigh-create.github.io/magne-web/tc/magne-phone.html">
  <link rel="alternate" hreflang="en" href="https://jerrysohigh-create.github.io/magne-web/magne-phone.html">
  <link rel="alternate" hreflang="x-default" href="https://jerrysohigh-create.github.io/magne-web/magne-phone.html">

  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta property="og:title" content="MAGNE Phone Gen1 — Hardware, Software, and Ownership Features">
  <meta property="og:description" content="Explore MAGNE Phone Gen1: UNISOC T9100 5G, 8 TOPS NPU, CC EAL6+ secure element, private dual-space, and native Web3 gateway in one device.">
  <meta property="og:image" content="https://jerrysohigh-create.github.io/magne-web/phone-white.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="MAGNE Phone Gen1 — Hardware, Software, and Ownership Features">
  <meta name="twitter:description" content="Explore MAGNE Phone Gen1: UNISOC T9100 5G, 8 TOPS NPU, CC EAL6+ secure element, private dual-space, and native Web3 gateway in one device.">
  <meta name="twitter:image" content="https://jerrysohigh-create.github.io/magne-web/phone-white.png">
  <link rel="icon" type="image/png" href="logo-icon-circle.png">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
  <style>
    :root {
      --bg-primary: #0a0a0c;
      --bg-secondary: #0f0f12;
      --bg-card: rgba(255, 255, 255, 0.03);
      --bg-card-hover: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.06);
      --border-hover: rgba(255, 255, 255, 0.12);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.5);
      --text-tertiary: rgba(255, 255, 255, 0.3);
      --accent: #00d4d4;
      --accent-secondary: #00ff88;
      --accent-purple: #a855f7;
      --accent-gold: #ffd700;
      --accent-pink: #ff6482;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Outfit', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* NODE NETWORK BACKGROUND */
    #node-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      opacity: 0.8;
      pointer-events: none;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 1rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(10, 10, 12, 0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-brand { display: flex; align-items: center; gap: 0.5rem; }
    .nav-brand a { color: var(--text-secondary); text-decoration: none; }
    .nav-logo { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
    .nav-links a:hover { color: var(--accent); }
    .nav-links a.active { color: var(--accent); }
    .nav-actions {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }
    .nav-cta {
      background: var(--accent);
      color: #000 !important;
      padding: 0.6rem 1.4rem;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
    }
    .nav-cta:hover { opacity: 0.9; transform: translateY(-1px); }
    .nav-contact {
      background: transparent;
      border: 1px solid var(--border-hover);
      color: var(--text-primary) !important;
      padding: 0.6rem 1.4rem;
      border-radius: 8px;
      font-weight: 500;
      text-decoration: none;
    }
    .nav-contact:hover { border-color: var(--accent); color: var(--accent) !important; }
    .nav-web3 {
      color: var(--accent-secondary) !important;
      font-size: 0.85rem;
    }
    .nav-web3:hover { color: var(--accent) !important; }
    .nav-lang-switch {
      color: rgba(255,255,255,0.5) !important;
      font-size: 0.8rem !important;
      text-decoration: none !important;
      padding: 0.2rem 0.5rem !important;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
    }
    .nav-lang-switch:hover {
      color: var(--accent) !important;
      border-color: var(--accent);
    }


    /* CONTENT WRAPPER */
    .content-wrapper {
      position: relative;
      z-index: 1;
      width: min(1200px, calc(100% - 48px));
      margin: 0 auto;
    }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 8rem 2rem 4rem;
      position: relative;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 800px; height: 600px;
      background: radial-gradient(ellipse at center, rgba(0,212,212,0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-eyebrow {
      font-size: 0.8rem;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      animation: fadeInUp 0.8s ease-out;
    }
    .hero h1 {
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.85) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fadeInUp 0.8s ease-out 0.1s both;
    }
    .hero-sub {
      font-size: 1.15rem;
      color: var(--text-secondary);
      max-width: 600px;
      margin-bottom: 3rem;
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }
    .hero-ctas { 
      display: flex; 
      gap: 1rem; 
      flex-wrap: wrap; 
      justify-content: center;
      animation: fadeInUp 0.8s ease-out 0.3s both;
    }
    .btn-primary {
      background: var(--accent);
      color: #000;
      padding: 1rem 2.5rem;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s;
      border: none;
      cursor: pointer;
    }
    .btn-primary:hover { 
      transform: translateY(-3px); 
      box-shadow: 0 15px 40px rgba(0,212,212,0.4);
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border-hover);
      color: var(--text-primary);
      padding: 1rem 2.5rem;
      border-radius: 8px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.3s;
    }
    .btn-secondary:hover { 
      border-color: var(--accent); 
      color: var(--accent);
    }

    /* SECTION BASE */
    section { 
      padding: 6rem 2rem; 
      max-width: 1200px; 
      margin: 0 auto; 
      position: relative;
    }
    .section-title {
      text-align: center;
      margin-bottom: 4rem;
    }
    .section-title h2 {
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .section-title p {
      color: var(--text-secondary);
      max-width: 600px;
      margin: 0 auto;
      font-size: 1rem;
    }

    /* PRODUCT VISUAL */
    .product-visual-section {
      padding: 4rem 2rem 6rem;
      text-align: center;
    }
    .product-image-stack {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 2rem;
      margin-top: 2rem;
      flex-wrap: wrap;
    }
    .product-image-stack img {
      max-height: 500px;
      filter: drop-shadow(0 30px 60px rgba(0,0,0,0.6));
    }
    .product-image-stack .phone-front {
      z-index: 2;
    }
    .product-image-stack .phone-back {
      z-index: 1;
      margin-bottom: 20px;
      opacity: 0.85;
    }

    /* SPECS GRID */
    .specs-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      margin-top: 3rem;
    }
    .spec-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      transition: all 0.3s;
    }
    .spec-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-3px);
    }
    .spec-icon {
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    .spec-card h4 {
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--text-secondary);
      margin-top: 0.25rem;
    }
    .spec-card p {
      color: var(--text-secondary);
      font-size: 0.9rem;
      line-height: 1.6;
    }
    .spec-card .spec-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: 0.4rem;
      display: block;
    }
    .spec-card h3 {
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.4;
    }
    .spec-card-featured {
      border-color: rgba(0, 212, 212, 0.3);
      background: rgba(0, 212, 212, 0.04);
    }
    .spec-card-featured:hover {
      border-color: rgba(0, 212, 212, 0.5);
      box-shadow: 0 4px 20px rgba(0, 212, 212, 0.1);
    }

    /* SOFTWARE ARCH */
    .software-layout {
      display: flex;
      align-items: center;
      gap: 4rem;
      margin-top: 3rem;
    }
    .software-visual {
      flex: 1;
      display: flex;
      justify-content: center;
    }
    .software-diagram {
      width: 280px;
      height: 280px;
      position: relative;
      margin: 0 auto;
    }
    .diagram-circle {
      position: absolute;
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .diagram-core {
      width: 100px; height: 100px;
      background: linear-gradient(135deg, rgba(0,212,212,0.2), rgba(0,212,212,0.05));
      border: 2px solid rgba(0,212,212,0.4);
      z-index: 3;
    }
    .diagram-outer {
      width: 180px; height: 180px;
      background: linear-gradient(135deg, rgba(168,85,247,0.1), rgba(168,85,247,0.02));
      border: 1px solid rgba(168,85,247,0.3);
      z-index: 2;
    }
    .diagram-nfc {
      width: 260px; height: 260px;
      background: linear-gradient(135deg, rgba(255,215,0,0.05), rgba(255,215,0,0.01));
      border: 1px solid rgba(255,215,0,0.2);
      z-index: 1;
    }

    /* Independent text labels */
    .diagram-tag {
      position: absolute;
      z-index: 10;
      text-align: center;
    }
    .diagram-tag .diagram-label {
      color: var(--text-primary);
      font-size: 0.8rem;
      font-weight: 600;
      display: block;
    }
    .diagram-tag .diagram-sublabel {
      font-size: 0.65rem;
      color: var(--text-secondary);
      font-weight: 400;
      display: block;
    }

    /* Position each tag separately */
    .tag-core {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      align-items: center;
      text-align: center;
      min-width: 120px;
    }
    .tag-outer {
      top: 46%;
      left: calc(50% + 98px);
      transform: translateY(-50%);
      align-items: flex-start;
      text-align: left;
      min-width: 138px;
    }
    .tag-nfc {
      top: calc(50% + 104px);
      left: 50%;
      transform: translateX(-50%);
      align-items: center;
      text-align: center;
      min-width: 180px;
    }

    @media (max-width: 600px) {
      .tag-core {
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        align-items: center;
        text-align: center;
        min-width: 100px;
      }
      .tag-outer {
        top: 46%;
        left: calc(50% + 82px);
        transform: translateY(-50%);
        align-items: flex-start;
        text-align: left;
        min-width: 118px;
      }
      .tag-nfc {
        top: calc(50% + 88px);
        left: 50%;
        transform: translateX(-50%);
        align-items: center;
        text-align: center;
        min-width: 150px;
      }
    }
    .software-content {
      flex: 1.2;
    }
    .software-item {
      padding: 1.5rem 0;
      border-bottom: 1px solid var(--border);
    }
    .software-item:last-child {
      border-bottom: none;
    }
    .software-item h4 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .software-item p {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    /* SECURITY SUMMARY */
    .security-summary {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem;
      margin-top: 4rem;
    }
    .security-summary h3 {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 2rem;
      text-align: center;
    }
    .security-layers {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .security-layer {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 1.5rem;
      border-radius: 12px;
      border: 1px solid;
    }
    .security-layer.layer-1 {
      background: rgba(0,212,212,0.05);
      border-color: rgba(0,212,212,0.2);
    }
    .security-layer.layer-2 {
      background: rgba(168,85,247,0.05);
      border-color: rgba(168,85,247,0.2);
    }
    .security-layer.layer-3 {
      background: rgba(255,215,0,0.05);
      border-color: rgba(255,215,0,0.2);
    }
    .layer-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.5rem;
      font-weight: 700;
      min-width: 50px;
    }
    .layer-1 .layer-num { color: var(--accent); }
    .layer-2 .layer-num { color: var(--accent-purple); }
    .layer-3 .layer-num { color: var(--accent-gold); }
    .layer-text h4 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .layer-text p {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .layer-badge {
      margin-left: auto;
      font-size: 0.75rem;
      padding: 0.3rem 0.8rem;
      border-radius: 50px;
      font-weight: 600;
    }
    .layer-1 .layer-badge { background: rgba(0,212,212,0.1); color: var(--accent); }
    .layer-2 .layer-badge { background: rgba(168,85,247,0.1); color: var(--accent-purple); }
    .layer-3 .layer-badge { background: rgba(0,212,212,0.08); color: var(--accent-gold); }

    /* CERTIFICATIONS */
    .cert-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-top: 3rem;
    }
    .cert-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem 1rem;
      text-align: center;
      transition: all 0.2s;
    }
    .cert-card:hover {
      border-color: var(--border-hover);
    }
    .cert-card h4 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .cert-card p {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    /* DIFFERENTIATION */
    .diff-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2rem;
      margin-top: 3rem;
    }
    .diff-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      transition: all 0.3s;
    }
    .diff-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-3px);
    }
    .diff-card h4 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--accent);
    }
    .diff-card p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.7;
    }

    /* CTA */
    .cta-section {
      text-align: center;
      padding: 6rem 2rem;
    }
    .cta-section h2 {
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .cta-section p {
      color: var(--text-secondary);
      margin-bottom: 2.5rem;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
    /* SECTION EYEBROW */
    .section-eyebrow {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 1rem;
      font-weight: 600;
    }
    .cta-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* FEATURE DEMOS */
    .demo-section {
      padding: 6rem 2rem;
    }
    .demo-shell {
      width: min(1100px, calc(100% - 48px));
      margin: 0 auto;
    }
    .demo-card {
      margin-top: 2rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem 2rem;
      text-align: center;
    }
    .demo-eyebrow {
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }
    .demo-card h3 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .demo-card p {
      max-width: 700px;
      margin: 0 auto;
      color: var(--text-secondary);
      line-height: 1.75;
      font-size: 1rem;
    }
    .demo-actions {
      margin-top: 2rem;
      display: flex;
      justify-content: center;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 4rem 2rem;
      border-top: 1px solid var(--border);
      color: var(--text-tertiary);
      font-size: 0.9rem;
    }
    footer a { color: var(--text-secondary); text-decoration: none; transition: color 0.2s; }
    footer a:hover { color: var(--accent); }
    .footer-links { display: flex; justify-content: center; gap: 2rem; margin-top: 1rem; }


    /* ANIMATIONS */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate { opacity: 0; }
    .animate.visible {
      animation: fadeInUp 0.6s ease-out forwards;
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .specs-grid { grid-template-columns: repeat(2, 1fr); }
      .software-layout { flex-direction: column; }
      .cert-grid { grid-template-columns: repeat(2, 1fr); }
      .diff-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      nav { padding: 1rem 1.5rem; }
      .nav-links { gap: 1rem; }
      .specs-grid { grid-template-columns: 1fr; }
      .cert-grid { grid-template-columns: repeat(2, 1fr); }
    }
  
    /* FOOTER SOCIAL ICONS */
    .footer-socials { display: flex; justify-content: center; flex-wrap: wrap; gap: 0.75rem; margin: 1rem 0; }
    .footer-socials a {
      display: inline-flex; align-items: center; justify-content: center;
      height: 42px; padding: 0;
      border: 1px solid var(--border); border-radius: 999px;
      color: var(--text-secondary); font-size: 0.82rem; transition: all 0.2s;
    }
    .footer-socials a:hover { color: var(--accent); border-color: var(--accent); background: rgba(0, 212, 212, 0.06); }
    .footer-copy { margin-top: 1.5rem; opacity: 0.5; }

    .footer-socials a.footer-icon svg { width: 20px; height: 20px; }
    .footer-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text-secondary);
      transition: all 0.2s;
      padding: 0;
    }
    .footer-icon:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(0, 212, 212, 0.1);
    }

    .footer-brand-logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .footer-brand-logo img {
      height: 24px;
      width: auto;
      margin-bottom: 0.75rem;
      opacity: 0.9;
    }
    .footer-brand-logo p {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
  
    .nav-logo-img {
      height: 20px;
      width: auto;
      display: block;
    }
  
    .trademark-notice {
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-align: center;
      margin-top: 1rem;
      opacity: 0.7;
    }
    .trademark-notice a {
      color: var(--accent);
      text-decoration: none;
    }
    .trademark-notice a:hover {
      text-decoration: underline;
    }

    /* GOOGLE SERVICES */
    #google-services {
      padding: 4rem 2rem;
    }
    .google-services-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
