<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found — MAGNE.AI</title>
  <meta name="description" content="The page you are looking for does not exist. Please check the URL or return to the MAGNE.AI homepage.">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <style>
    :root {
      --bg-primary: #0a0a0c;
      --bg-secondary: #0f0f12;
      --accent: #00d4d4;
      --accent-secondary: #00ff88;
      --text-primary: #ffffff;
      --text-secondary: rgba(255,255,255,0.65);
      --border: rgba(255,255,255,0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .error-code {
      font-size: clamp(5rem, 20vw, 10rem);
      font-weight: 800;
      color: var(--accent);
      opacity: 0.15;
      line-height: 1;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 700;
      margin-bottom: 1rem;
    }
    p {
      color: var(--text-secondary);
      font-size: 1.1rem;
      max-width: 480px;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }
    .btn-group {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    a {
      display: inline-block;
      padding: 0.85rem 2rem;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--accent);
      color: #000;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,212,212,0.3); }
    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-primary);
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .footer-note {
      position: fixed;
      bottom: 2rem;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.3);
    }
    .footer-note a { color: rgba(255,255,255,0.4); padding: 0; font-size: inherit; }
    .footer-note a:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="error-code">404</div>
  <h1>Page Not Found</h1>
  <p>The page you are looking for has been moved, renamed, or does not exist. Please return to the homepage or explore the links below.</p>
  <div class="btn-group">
    <a href="magne-home.html" class="btn-primary">Back to Homepage</a>
    <a href="magne-contact.html" class="btn-secondary">Contact MAGNE.AI</a>
  </div>
  <p class="footer-note">
    Looking for whitepaper, token, or developer docs? <a href="https://web3.magne.ai" target="_blank">Visit web3.magne.ai ↗️</a>
  </p>
</body>
</html>
