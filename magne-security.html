<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="alternate" hreflang="en" href="magne-security.html">
  <link rel="alternate" hreflang="x-default" href="magne-security.html">

  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">

  <meta name="twitter:title" content="Security Architecture — Three Layers of Hardware Wallet-grade Protection">
  <meta name="twitter:description" content="MAGNE combines CC EAL2+ TEE, CC EAL6+ secure element, and NFC encrypted recovery in three hardware-level protection layers.">
  <meta name="twitter:image" content="https://jerrysohigh-create.github.io/magne-web/phone-white.png">
  <link rel="icon" type="image/png" href="logo-icon-circle.png">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
  <style>
    :root {
      --bg-primary: #0a0a0c;
      --bg-secondary: #0f0f12;
      --bg-card: rgba(255, 255, 255, 0.03);
      --bg-card-hover: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.06);
      --border-hover: rgba(255, 255, 255, 0.12);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.5);
      --text-tertiary: rgba(255, 255, 255, 0.3);
      --accent: #a855f7;
      --accent-secondary: #00ff88;
      --accent-purple: #a855f7;
      --accent-gold: #ffd700;
      --accent-pink: #ff6482;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Outfit', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* NODE NETWORK BACKGROUND */
    #node-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      opacity: 0.80;
      pointer-events: none;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 1rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(10, 10, 12, 0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-brand { display: flex; align-items: center; gap: 0.5rem; }
    .nav-brand a { color: var(--text-secondary); text-decoration: none; }
    .nav-logo { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
    .nav-links a:hover { color: var(--accent); }
    .nav-links a.active { color: var(--accent); }
    .nav-actions {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }
    .nav-cta {
      background: var(--accent);
      color: #000 !important;
      padding: 0.6rem 1.4rem;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
    }
    .nav-cta:hover { opacity: 0.9; transform: translateY(-1px); }
    .nav-contact {
      background: transparent;
      border: 1px solid var(--border-hover);
      color: var(--text-primary) !important;
      padding: 0.6rem 1.4rem;
      border-radius: 8px;
      font-weight: 500;
      text-decoration: none;
    }
    .nav-contact:hover { border-color: var(--accent); color: var(--accent) !important; }
    .nav-web3 {
      color: var(--accent-secondary) !important;
      font-size: 0.85rem;
    }
    .nav-web3:hover { color: var(--accent) !important; }
    .nav-lang-switch {
      color: rgba(255,255,255,0.5) !important;
      font-size: 0.8rem !important;
      text-decoration: none !important;
      padding: 0.2rem 0.5rem !important;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
    }
    .nav-lang-switch:hover {
      color: var(--accent) !important;
      border-color: var(--accent);
    }


    /* CONTENT WRAPPER */
    .content-wrapper {
      position: relative;
      z-index: 1;
      width: min(1200px, calc(100% - 48px));
      margin: 0 auto;
    }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 8rem 2rem 4rem;
      position: relative;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 900px; height: 700px;
      background: radial-gradient(ellipse at center, rgba(168,85,247,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-eyebrow {
      font-size: 0.8rem;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      animation: fadeInUp 0.8s ease-out;
    }
    .hero h1 {
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.85) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fadeInUp 0.8s ease-out 0.1s both;
    }
    .hero-sub {
      font-size: 1.15rem;
      color: var(--text-secondary);
      max-width: 650px;
      margin-bottom: 3rem;
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }
    .hero-ctas { 
      display: flex; 
      gap: 1rem; 
      flex-wrap: wrap; 
      justify-content: center;
      animation: fadeInUp 0.8s ease-out 0.3s both;
    }
    .btn-primary {
      background: var(--accent);
      color: #000;
      padding: 1rem 2.5rem;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s;
      border: none;
      cursor: pointer;
    }
    .btn-primary:hover { 
      transform: translateY(-3px); 
      box-shadow: 0 15px 40px rgba(168,85,247,0.4);
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border-hover);
      color: var(--text-primary);
      padding: 1rem 2.5rem;
      border-radius: 8px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.3s;
    }
    .btn-secondary:hover { 
      border-color: var(--accent); 
      color: var(--accent);
    }

    /* SECTION INNER WRAPPER */
    .section-inner {
      width: min(1200px, calc(100% - 48px));
      margin-left: auto;
      margin-right: auto;
    }

    /* SECTION BASE */
    section { 
      padding: 6rem 2rem; 
      max-width: 1100px; 
      margin: 0 auto; 
      position: relative;
    }
    .section-title {
      text-align: center;
      margin-bottom: 4rem;
    }
    .section-title h2 {
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .section-title p {
      color: var(--text-secondary);
      max-width: 600px;
      margin: 0 auto;
      font-size: 1rem;
    }

    /* CENTRAL ARCHITECTURE VISUAL */
    .arch-hero {
      padding: 4rem 2rem 6rem;
      text-align: center;
    }
    .arch-diagram {
      max-width: 900px;
      margin: 0 auto;
      position: relative;
    }
    .arch-stack {
      display: flex;
      flex-direction: column;
      gap: 0;
      align-items: center;
    }
    .arch-layer-box {
      width: 100%;
      max-width: 700px;
      padding: 2.5rem 2rem;
      text-align: center;
      position: relative;
      border: 1px solid;
    }
    .arch-layer-box::before {
      content: '';
      position: absolute;
      left: 50%;
      top: -20px;
      transform: translateX(-50%);
      border: 10px solid transparent;
    }
    .arch-layer-box.layer-1 {
      background: linear-gradient(180deg, rgba(0,212,212,0.12) 0%, rgba(0,212,212,0.04) 100%);
      border-color: rgba(0,212,212,0.3);
      border-radius: 16px 16px 0 0;
    }
    .arch-layer-box.layer-1::before {
      border-bottom-color: rgba(0,212,212,0.3);
      top: -20px;
    }
    .arch-layer-box.layer-2 {
      background: linear-gradient(180deg, rgba(168,85,247,0.12) 0%, rgba(168,85,247,0.04) 100%);
      border-color: rgba(168,85,247,0.3);
      border-top: none;
    }
    .arch-layer-box.layer-2::before {
      border-bottom-color: rgba(168,85,247,0.3);
      top: -20px;
    }
    .arch-layer-box.layer-3 {
      background: linear-gradient(180deg, rgba(255,215,0,0.12) 0%, rgba(255,215,0,0.04) 100%);
      border-color: rgba(255,215,0,0.3);
      border-top: none;
      border-radius: 0 0 16px 16px;
    }
    .arch-layer-box.layer-3::before {
      border-bottom-color: rgba(255,215,0,0.3);
      top: -20px;
    }
    .arch-layer-label {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.25rem 0.75rem;
      border-radius: 50px;
      margin-bottom: 1rem;
      letter-spacing: 1px;
    }
    .layer-1 .arch-layer-label {
      background: rgba(0,212,212,0.2);
      color: var(--accent);
    }
    .layer-2 .arch-layer-label {
      background: rgba(168,85,247,0.2);
      color: var(--accent-purple);
    }
    .layer-3 .arch-layer-label {
      background: rgba(255,215,0,0.2);
      color: var(--accent-gold);
    }
    .arch-layer-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .arch-layer-sub {
      font-size: 0.95rem;
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }
    .arch-layer-badge {
      display: inline-block;
      font-size: 0.75rem;
      padding: 0.3rem 0.8rem;
      border-radius: 50px;
      font-weight: 600;
    }
    .layer-1 .arch-layer-badge {
      background: rgba(0,212,212,0.15);
      color: var(--accent);
    }
    .layer-2 .arch-layer-badge,
    .layer-3 .arch-layer-badge {
      background: rgba(168,85,247,0.15);
      color: var(--accent-purple);
    }
    .layer-3 .arch-layer-badge {
      background: rgba(255,215,0,0.15);
      color: var(--accent-gold);
    }
    .arch-connector {
      width: 2px;
      height: 40px;
      background: linear-gradient(180deg, rgba(168,85,247,0.5), rgba(0,212,212,0.5));
    }

    /* LAYER DETAIL */
    .layer-detail {
      display: flex;
      align-items: flex-start;
      gap: 4rem;
      padding: 4rem 0;
      border-bottom: 1px solid var(--border);
    }
    .layer-detail:last-of-type {
      border-bottom: none;
    }
    .layer-detail.reverse {
      flex-direction: row-reverse;
    }
    .layer-info {
      flex: 1;
    }
    .layer-visual {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .layer-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 4rem;
      font-weight: 700;
      margin-bottom: 1rem;
      opacity: 0.15;
      line-height: 1;
    }
    .layer-info h3 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .layer-info p {
      color: var(--text-secondary);
      font-size: 1rem;
      line-height: 1.8;
      margin-bottom: 1.5rem;
    }
    .layer-badges {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .layer-badge {
      font-size: 0.8rem;
      padding: 0.4rem 1rem;
      border-radius: 50px;
      font-weight: 600;
    }
    .layer-detail.layer-1-detail .layer-badge {
      background: rgba(0,212,212,0.15);
      color: var(--accent);
    }
    .layer-detail.layer-2-detail .layer-badge,
    .layer-detail.layer-3-detail .layer-badge {
      background: rgba(168,85,247,0.15);
      color: var(--accent-purple);
    }
    .layer-detail.layer-3-detail .layer-badge {
      background: rgba(255,215,0,0.15);
      color: var(--accent-gold);
    }
    .layer-icon-box {
      width: 200px;
      height: 200px;
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      border: 1px solid;
    }
    .layer-1-detail .layer-icon-box {
      background: linear-gradient(135deg, rgba(0,212,212,0.1) 0%, rgba(0,212,212,0.02) 100%);
      border-color: rgba(0,212,212,0.3);
    }
    .layer-2-detail .layer-icon-box {
      background: linear-gradient(135deg, rgba(168,85,247,0.1) 0%, rgba(168,85,247,0.02) 100%);
      border-color: rgba(168,85,247,0.3);
    }
    .layer-3-detail .layer-icon-box {
      background: linear-gradient(135deg, rgba(255,215,0,0.1) 0%, rgba(255,215,0,0.02) 100%);
      border-color: rgba(255,215,0,0.3);
    }
    .layer-icon-box .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    .layer-icon-box .label {
      font-size: 0.85rem;
      font-weight: 600;
    }
    .layer-icon-box .sublabel {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 0.25rem;
    }

    /* OWNERSHIP FLOW */
    .flow-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem;
      margin: 4rem 0;
    }
    .flow-section h3 {
      text-align: center;
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 3rem;
    }
    .flow-steps {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0;
      flex-wrap: wrap;
    }
    .flow-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 1rem;
      min-width: 100px;
    }
    .flow-icon {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
    }
    .flow-step:nth-child(1) .flow-icon { background: rgba(0,212,212,0.2); }
    .flow-step:nth-child(3) .flow-icon { background: rgba(0,212,212,0.2); }
    .flow-step:nth-child(5) .flow-icon { background: rgba(168,85,247,0.2); }
    .flow-step:nth-child(7) .flow-icon { background: rgba(168,85,247,0.2); }
    .flow-step:nth-child(9) .flow-icon { background: rgba(255,215,0,0.2); }
    .flow-label {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .flow-sublabel {
      font-size: 0.7rem;
      color: var(--text-secondary);
    }
    .flow-arrow {
      font-size: 1.5rem;
      color: var(--text-tertiary);
      padding: 0 0.5rem;
    }

    /* VS TABLE */
    .vs-section {
      margin: 4rem 0;
    }
    .vs-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 2rem;
      table-layout: fixed;
    }
    .vs-table th,
    .vs-table td {
      padding: 1.25rem 1.5rem;
      vertical-align: middle;
      border-bottom: 1px solid var(--border);
    }
    .vs-table th {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-secondary);
      font-weight: 600;
      text-align: center;
    }
    .vs-table td:first-child {
      text-align: center;
      font-weight: 600;
    }
    .vs-table td:nth-child(2),
    .vs-table td:nth-child(3) {
      text-align: left;
    }
    .vs-table tr:hover td {
      background: var(--bg-card);
    }
    .vs-highlight {
      color: var(--accent);
      font-weight: 600;
    }
    .vs-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 50px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .vs-badge.magne {
      background: rgba(168,85,247,0.2);
      color: var(--accent-purple);
    }
    .vs-badge.software {
      background: rgba(255,255,255,0.1);
      color: var(--text-secondary);
    }

    /* SUPPORTING PROOF */
    .proof-grid {
      display: flex;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
      margin: 3rem 0;
    }
    .proof-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem 2.5rem;
      text-align: center;
      min-width: 200px;
    }
    .proof-item h4 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent-purple);
      margin-bottom: 0.5rem;
    }
    .proof-item p {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    /* CTA */
    .cta-section {
      text-align: center;
      padding: 6rem 2rem;
      background: linear-gradient(180deg, transparent 0%, rgba(168,85,247,0.03) 100%);
      border-top: 1px solid var(--border);
    }
    .cta-section h2 {
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .cta-section p {
      color: var(--text-secondary);
      margin-bottom: 2.5rem;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
    .cta-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 4rem 2rem;
      border-top: 1px solid var(--border);
      color: var(--text-tertiary);
      font-size: 0.9rem;
    }
    footer a { color: var(--text-secondary); text-decoration: none; transition: color 0.2s; }
    footer a:hover { color: var(--accent); }
    .footer-links { display: flex; justify-content: center; gap: 2rem; margin-top: 1rem; }
    .footer-links-secondary { display: flex; justify-content: center; gap: 2rem; margin-top: 0.75rem; }
    .footer-links-secondary a { color: var(--text-secondary); text-decoration: none; font-size: 0.85rem; }
    .footer-links-secondary a:hover { color: var(--accent); }

    /* ANIMATIONS */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate { opacity: 0; }
    .animate.visible {
      animation: fadeInUp 0.6s ease-out forwards;
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .layer-detail,
      .layer-detail.reverse {
        flex-direction: column;
        gap: 2rem;
      }
      .layer-visual {
        order: -1;
      }
      .flow-steps {
        gap: 1rem;
      }
      .flow-arrow {
        display: none;
      }
    }
    @media (max-width: 600px) {
      nav { padding: 1rem 1.5rem; }
      .nav-links { gap: 1rem; }
      .arch-layer-box {
        padding: 2rem 1rem;
      }
      .arch-layer-title {
        font-size: 1.2rem;
      }
      .proof-grid {
        flex-direction: column;
        align-items: center;
      }
    }
  
    /* FOOTER SOCIAL ICONS */
    .footer-socials { display: flex; justify-content: center; flex-wrap: wrap; gap: 0.75rem; margin: 1rem 0; }
    .footer-socials a {
      display: inline-flex; align-items: center; justify-content: center;
      height: 42px; padding: 0;
      border: 1px solid var(--border); border-radius: 999px;
      color: var(--text-secondary); font-size: 0.82rem; transition: all 0.2s;
    }
    .footer-socials a:hover { color: var(--accent); border-color: var(--accent); background: rgba(0, 212, 212, 0.06); }
    .footer-copy { margin-top: 1.5rem; opacity: 0.5; }

    .footer-socials a.footer-icon svg { width: 20px; height: 20px; }
    .footer-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text-secondary);
      transition: all 0.2s;
      padding: 0;
    }
    .footer-icon:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(0, 212, 212, 0.1);
    }

    .footer-brand-logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .footer-brand-logo img {
      height: 24px;
      width: auto;
      margin-bottom: 0.75rem;
      opacity: 0.9;
    }
    .footer-brand-logo p {
      color: var(--text-secondary);
      font-size: 0.9rem;
